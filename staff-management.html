<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタッフ管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Noto Sans JP', sans-serif;
    background: #EFE8D8;
    color: #2E3B22;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 24px 14px 40px; }
  .top-nav { text-align: left; margin-bottom: 10px; }
  .top-nav a { font-size: 12px; color: #7A7256; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
  .site-title { font-size: 18px; font-weight: 700; margin: 0 0 18px; display: flex; align-items: center; gap: 8px; }
  .site-title .icon-badge {
    width: 32px; height: 32px; border-radius: 9px; background: #DCE6EA; color: #3D5A75;
    display: flex; align-items: center; justify-content: center; font-size: 17px;
  }
  .card { background: #F7F3E9; border: 1px solid #D6CBAA; border-radius: 12px; padding: 16px; margin-bottom: 14px; }

  .tabs { display: flex; border: 1px solid #D6CBAA; border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
  .tab-btn { flex: 1; padding: 10px; border: none; background: #F7F3E9; color: #7A7256; font-family: inherit; font-size: 14px; cursor: pointer; }
  .tab-btn.active { background: #2E3B22; color: #fff; font-weight: 700; }

  .staff-card { border: 1px solid #D6CBAA; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
  .staff-name { font-size: 14px; font-weight: 700; margin: 0 0 6px; }
  .staff-row { display: flex; justify-content: space-between; font-size: 12px; color: #7A7256; padding: 2px 0; }
  .staff-row b { color: #2E3B22; font-weight: 700; }
  .map-link { color: #3D5A75; text-decoration: none; font-weight: 700; }
  .ledger-inline { margin-top: 10px; max-height: 220px; overflow-y: auto; border-top: 1px solid #D6CBAA; padding-top: 6px; }

  .ledger-select-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .ledger-select-row select { flex: 1; padding: 10px; font-size: 13px; border-radius: 8px; border: 1px solid #D6CBAA; font-family: inherit; }
  .ledger-day-row {
    display: flex; justify-content: space-between; align-items: center; font-size: 13px;
    padding: 8px 4px; border-bottom: 1px dashed #D6CBAA;
  }
  .ledger-day-row.no-record { color: #A69B7A; }
  .ledger-day-date { font-weight: 700; width: 84px; flex-shrink: 0; }
  .ledger-day-info { color: #6B6048; text-align: right; flex: 1; }
  .ledger-total { display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; padding: 10px 12px; background: #F0DEB8; color: #8A5A2A; border-radius: 10px; margin-top: 10px; }
  .payslip-summary { background: #F7F3E9; border: 1px solid #D6CBAA; border-radius: 10px; padding: 10px 12px; margin-bottom: 14px; }
  .payslip-summary-title { font-size: 12px; font-weight: 700; color: #6B6048; margin: 0 0 6px; }
  .history-grid { border-collapse: collapse; font-size: 12px; white-space: nowrap; }
  .history-grid th, .history-grid td { border: 1px solid #D6CBAA; padding: 8px 10px; text-align: right; }
  .history-grid th { background: #2E3B22; color: #fff; font-weight: 700; }
  .history-grid td.month-cell { text-align: left; font-weight: 700; background: #F7F3E9; position: sticky; left: 0; }
  .history-grid th.month-head { position: sticky; left: 0; z-index: 2; }
  .history-grid tr.total-row td { background: #F0DEB8; color: #8A5A2A; font-weight: 700; }

  .status {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    width: calc(100% - 32px); max-width: 480px; z-index: 2000;
    padding: 14px 16px; border-radius: 12px; font-size: 14px; font-weight: 500;
    line-height: 1.6; display: none; white-space: pre-line; overflow: hidden;
    box-shadow: 0 10px 28px rgba(0,0,0,0.25);
  }
  .status.show { display: block; }
  .status.error { background: #8B3A2E; color: #fff; }
  .status.loading { background: #4A4436; color: #fff; }
  .processing-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 3000; }
  .processing-box { background: #F7F3E9; border-radius: 16px; padding: 28px 36px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  .processing-box p { font-size: 14px; font-weight: 700; color: #2E3B22; margin: 0; }
  .spinner { width: 36px; height: 36px; border: 4px solid #D6CBAA; border-top-color: #2E3B22; border-radius: 50%; margin: 0 auto 14px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-nav"><a href="index.html"><i class="ti ti-arrow-left" aria-hidden="true"></i> ホームへ戻る</a></div>
  <h1 class="site-title"><span class="icon-badge"><i class="ti ti-users" aria-hidden="true"></i></span>スタッフ管理</h1>

  <div id="blockedCard" class="card" style="text-align:center; display:none;">
    <p style="font-weight:700; color:#8B3A2E;">この画面は管理者のみ利用できます</p>
  </div>

  <div id="mainContent" style="display:none;">
    <div class="tabs">
      <button class="tab-btn active" id="tabMonthlyBtn" onclick="switchTab('monthly')">今月の状況</button>
      <button class="tab-btn" id="tabLedgerBtn" onclick="switchTab('ledger')">過去の給与明細</button>
      <button class="tab-btn" id="tabHistoryBtn" onclick="switchTab('history')">月別一覧</button>
    </div>

    <div id="monthlyView" class="card"></div>

    <div id="ledgerView" class="card" style="display:none;">
      <div class="ledger-select-row">
        <select id="ledgerStaffSelect" onchange="onStaffChange()"></select>
        <select id="ledgerMonthSelect" onchange="loadLedger()"></select>
      </div>
      <div id="ledgerList">スタッフと月を選んでください</div>
    </div>

    <div id="historyView" class="card" style="display:none; overflow-x:auto;">
      <div id="historyGridWrap">月別一覧を読み込み中...</div>
    </div>
  </div>

  <div class="processing-overlay" id="processingOverlay" style="display:none;">
    <div class="processing-box">
      <div class="spinner"></div>
      <p id="processingText">処理中...</p>
    </div>
  </div>

  <div class="status" id="initStatus" style="display:none;"></div>

  <p style="text-align:center; font-size:10px; color:#A69B7A; margin-top:20px;">v1.08</p>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbznmvwCK8JdC-BsXRjcaTNj6lhm_11EyPW4xv_fSaXmxt6FsZzFFPG2FLk7wsLuSROItA/exec';
var LIFF_ID = '2010745560-GD4XbdoK';

var profile = null;
var currentTab = 'monthly';
var historyLoaded = false;
var ledgerInit = false;
var monthsByStaff = {};

function showProcessing(text) {
  document.getElementById('processingText').textContent = text;
  document.getElementById('processingOverlay').style.display = 'flex';
}
function hideProcessing() {
  document.getElementById('processingOverlay').style.display = 'none';
}

function callServer(payload) {
  return fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  }).then(function (res) { return res.json(); });
}

function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise(function (_, reject) { setTimeout(function () { reject(new Error('TIMEOUT')); }, ms); })
  ]);
}

function setPageStatus(type, text) {
  var el = document.getElementById('initStatus');
  el.className = 'status show ' + type;
  el.textContent = text;
  if (type !== 'loading') setTimeout(function () { el.classList.remove('show'); }, type === 'error' ? 4500 : 2500);
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabMonthlyBtn').classList.toggle('active', tab === 'monthly');
  document.getElementById('tabLedgerBtn').classList.toggle('active', tab === 'ledger');
  document.getElementById('tabHistoryBtn').classList.toggle('active', tab === 'history');
  document.getElementById('monthlyView').style.display = (tab === 'monthly') ? 'block' : 'none';
  document.getElementById('ledgerView').style.display = (tab === 'ledger') ? 'block' : 'none';
  document.getElementById('historyView').style.display = (tab === 'history') ? 'block' : 'none';
  if (tab === 'ledger' && !ledgerInit) initLedgerTab();
  if (tab === 'history' && !historyLoaded) loadHistoryGrid();
}

function loadMonthlyStatus() {
  var el = document.getElementById('monthlyView');
  el.innerHTML = '<p style="font-size:13px; color:#7A7256;">読み込み中...</p>';

  callServer({ action: 'getStaffMonthlyStatus', userId: profile.userId }).then(function (result) {
    if (result.status !== 'ok') {
      el.innerHTML = '<p style="font-size:13px; color:#8B3A2E;">' + result.message + '</p>';
      return;
    }
    if (result.staff.length === 0) {
      el.innerHTML = '<p style="font-size:13px; color:#7A7256;">今月のデータはまだありません。</p>';
      return;
    }
    var tParts = result.today.split('-');
    var tLabel = tParts[0] + '年' + Number(tParts[1]) + '月' + Number(tParts[2]) + '日';
    el.innerHTML = '<p style="font-size:12px; color:#7A7256; margin:0 0 10px;">' + tLabel + ' 時点</p>';

    result.staff.forEach(function (s) {
      var card = document.createElement('div');
      card.className = 'staff-card';

      var summaryHtml =
        '<p class="staff-name">' + s.name + '</p>' +
        '<div class="staff-row"><span>出勤日数</span><b>' + s.workDays + '日</b></div>' +
        '<div class="staff-row"><span>実働時間</span><b>' + s.totalHours.toFixed(1) + 'h</b></div>' +
        '<div class="staff-row"><span>交通費</span><b>' + s.transportFee.toLocaleString() + '円</b></div>' +
        '<div class="staff-row"><span>給与見込み</span><b>' + s.estimatedWage.toLocaleString() + '円</b></div>';

      var daysHtml = '<div class="ledger-inline">';
      s.days.forEach(function (d) {
        if (d.noRecord) {
          daysHtml += '<div class="ledger-day-row no-record"><span class="ledger-day-date">' + d.day + '日(' + d.weekday + ')</span><span class="ledger-day-info">記録なし</span></div>';
        } else {
          var breakLabel = d.breakUsed ? '休憩あり' : '';
          var mapHtml = d.mapUrl ? '<a class="map-link" href="' + d.mapUrl + '" target="_blank">地図</a>' : '';
          daysHtml +=
            '<div class="ledger-day-row"><span class="ledger-day-date">' + d.day + '日(' + d.weekday + ')</span>' +
            '<span class="ledger-day-info">' + d.clockIn + '〜' + d.clockOut + '　' + breakLabel + '　' + d.hoursLabel + (d.hoursLabel ? 'h' : '') + ' ' + mapHtml + '</span></div>';
        }
      });
      daysHtml += '</div>';

      card.innerHTML = summaryHtml + daysHtml;
      el.appendChild(card);
    });
  });
}

function initLedgerTab() {
  ledgerInit = true;

  // 月のプルダウン：2024年1月〜今月まで、年ごとにグループ化して用意
  var monthSel = document.getElementById('ledgerMonthSelect');
  var now = new Date();
  var startYear = 2024;
  var years = {};
  for (var y = now.getFullYear(); y >= startYear; y--) {
    var maxMonth = (y === now.getFullYear()) ? now.getMonth() : 11;
    var group = document.createElement('optgroup');
    group.label = y + '年';
    for (var m = maxMonth; m >= 0; m--) {
      var ym = y + '-' + (m + 1 < 10 ? '0' + (m + 1) : (m + 1));
      var opt = document.createElement('option');
      opt.value = ym;
      opt.textContent = (m + 1) + '月';
      group.appendChild(opt);
    }
    monthSel.appendChild(group);
  }

  callServer({ action: 'getStaffNames', userId: profile.userId }).then(function (result) {
    var staffSel = document.getElementById('ledgerStaffSelect');
    staffSel.innerHTML = '';
    if (result.status !== 'ok') {
      document.getElementById('ledgerList').innerHTML = '<p style="font-size:13px; color:#8B3A2E;">' + (result.message || '取得に失敗しました。') + '</p>';
      return;
    }
    if (result.names.length === 0) {
      document.getElementById('ledgerList').innerHTML = '<p style="font-size:13px; color:#7A7256;">スタッフが登録されていません。</p>';
      return;
    }
    monthsByStaff = result.monthsByName || {};
    result.names.forEach(function (name) {
      var opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      staffSel.appendChild(opt);
    });
    updateMonthAvailability();
    loadLedger();
  }).catch(function (err) {
    document.getElementById('ledgerList').innerHTML = '<p style="font-size:13px; color:#8B3A2E;">通信エラーが発生しました：' + (err && err.message ? err.message : err) + '</p>';
  });
}

function formatYearMonthValue(d) {
  var m = d.getMonth() + 1;
  return d.getFullYear() + '-' + (m < 10 ? '0' + m : m);
}

function onStaffChange() {
  updateMonthAvailability();
  loadLedger();
}

// 選んだスタッフに打刻記録がない月は、選べないようグレーアウトする
function updateMonthAvailability() {
  var staffName = document.getElementById('ledgerStaffSelect').value;
  var available = monthsByStaff[staffName] || [];
  var availableSet = {};
  available.forEach(function (ym) { availableSet[ym] = true; });

  var monthSel = document.getElementById('ledgerMonthSelect');
  var options = monthSel.querySelectorAll('option');
  var firstAvailable = null;
  options.forEach(function (opt) {
    var hasData = !!availableSet[opt.value];
    opt.disabled = !hasData;
    opt.textContent = opt.textContent.replace(' （記録なし）', '') + (hasData ? '' : ' （記録なし）');
    if (hasData && !firstAvailable) firstAvailable = opt.value;
  });
  if (firstAvailable && monthSel.options[monthSel.selectedIndex].disabled) {
    monthSel.value = firstAvailable;
  }
}

function loadLedger() {
  var staffName = document.getElementById('ledgerStaffSelect').value;
  var yearMonth = document.getElementById('ledgerMonthSelect').value;
  var el = document.getElementById('ledgerList');
  if (!staffName || !yearMonth) return;
  el.innerHTML = '<p style="font-size:13px; color:#7A7256;">読み込み中...</p>';

  callServer({ action: 'getStaffAttendanceLedger', userId: profile.userId, staffName: staffName, yearMonth: yearMonth })
    .then(function (result) {
      if (result.status !== 'ok') {
        el.innerHTML = '<p style="font-size:13px; color:#8B3A2E;">' + result.message + '</p>';
        return;
      }
      el.innerHTML = '';

      if (result.payslip) {
        var p = result.payslip;
        var payslipBox = document.createElement('div');
        payslipBox.className = 'payslip-summary';
        payslipBox.innerHTML =
          '<p class="payslip-summary-title">確定済みの給与明細</p>' +
          '<div class="staff-row"><span>時給</span><b>' + p.hourlyWage.toLocaleString() + '円</b></div>' +
          '<div class="staff-row"><span>勤務給与</span><b>' + p.wagePay.toLocaleString() + '円</b></div>' +
          '<div class="staff-row"><span>交通費</span><b>' + p.transportFee.toLocaleString() + '円</b></div>' +
          '<div class="staff-row"><span>給与額（合計）</span><b>' + p.totalPay.toLocaleString() + '円</b></div>';
        el.appendChild(payslipBox);
      } else {
        var noPayslip = document.createElement('p');
        noPayslip.style.cssText = 'font-size:12px; color:#A69B7A; margin:0 0 12px;';
        noPayslip.textContent = 'この月はまだ給与確定していません（打刻の記録のみ表示しています）';
        el.appendChild(noPayslip);
      }

      result.days.forEach(function (d) {
        var row = document.createElement('div');
        var dateLabel = Number(d.date.slice(8, 10)) + '日(' + d.weekday + ')';
        if (d.noRecord) {
          row.className = 'ledger-day-row no-record';
          row.innerHTML = '<span class="ledger-day-date">' + dateLabel + '</span><span class="ledger-day-info">記録なし</span>';
        } else {
          row.className = 'ledger-day-row';
          var breakLabel = d.breakUsed ? '休憩あり' : '';
          row.innerHTML =
            '<span class="ledger-day-date">' + dateLabel + '</span>' +
            '<span class="ledger-day-info">' + d.clockIn + '〜' + d.clockOut + '　' + breakLabel + '　' + d.hoursLabel + 'h</span>';
        }
        el.appendChild(row);
      });
      var totalBox = document.createElement('div');
      totalBox.className = 'ledger-total';
      totalBox.innerHTML = '<span>合計実働時間</span><span>' + result.totalHours + '時間</span>';
      el.appendChild(totalBox);
    });
}

function loadHistoryGrid() {
  var wrap = document.getElementById('historyGridWrap');
  wrap.innerHTML = '<p style="font-size:13px; color:#7A7256;">読み込み中...</p>';

  callServer({ action: 'getAllStaffHistory', userId: profile.userId }).then(function (result) {
    if (result.status !== 'ok') {
      wrap.innerHTML = '<p style="font-size:13px; color:#8B3A2E;">' + result.message + '</p>';
      return;
    }
    if (result.rows.length === 0) {
      wrap.innerHTML = '<p style="font-size:13px; color:#7A7256;">まだ確定した給与明細はありません。</p>';
      return;
    }
    historyLoaded = true;

    var html = '<table class="history-grid"><thead><tr><th class="month-head">年月</th>';
    result.names.forEach(function (name) { html += '<th>' + name + '</th>'; });
    html += '<th>合計</th></tr></thead><tbody>';

    result.rows.forEach(function (row) {
      var parts = row.yearMonth.split('-');
      var label = parts[0] + '年' + Number(parts[1]) + '月';
      html += '<tr><td class="month-cell">' + label + '</td>';
      row.cells.forEach(function (v) { html += '<td>' + (v ? v.toLocaleString() + '円' : '-') + '</td>'; });
      html += '<td>' + row.total.toLocaleString() + '円</td></tr>';
    });

    var grandTotal = result.rows.reduce(function (sum, r) { return sum + r.total; }, 0);
    html += '<tr class="total-row"><td class="month-cell">総合計</td>';
    result.names.forEach(function (name, idx) {
      var colTotal = result.rows.reduce(function (sum, r) { return sum + r.cells[idx]; }, 0);
      html += '<td>' + colTotal.toLocaleString() + '円</td>';
    });
    html += '<td>' + grandTotal.toLocaleString() + '円</td></tr>';

    html += '</tbody></table>';
    wrap.innerHTML = html;
  });
}

if (typeof liff === 'undefined') {
  document.getElementById('initStatus').className = 'status show error';
  document.getElementById('initStatus').textContent = 'LIFF SDKの読み込みに失敗しました。開き直してください。';
} else {
  showProcessing('読み込み中...しばらくお待ちください');
  withTimeout(liff.init({ liffId: LIFF_ID }), 10000).then(function () {
    if (!liff.isLoggedIn()) { liff.login(); return Promise.reject('LOGIN_REDIRECT'); }
    return withTimeout(liff.getProfile(), 10000);
  }).then(function (p) {
    profile = p;
    return callServer({ action: 'checkAdmin', userId: p.userId });
  }).then(function (result) {
    hideProcessing();
    document.getElementById('initStatus').style.display = 'none';
    if (result.status === 'ok') {
      document.getElementById('mainContent').style.display = 'block';
      loadMonthlyStatus();
    } else {
      document.getElementById('blockedCard').style.display = 'block';
    }
  }).catch(function (err) {
    if (err === 'LOGIN_REDIRECT') return;
    hideProcessing();
    var el = document.getElementById('initStatus');
    el.className = 'status show error';
    el.textContent = '初期化エラー：' + ((err && err.message) ? err.message : err);
  });
}
</script>
</body>
</html>
